name: Auto-merge status branches

# Fast-forward-merges side branches pushed by the daily Claude routine
# (`auto/status-YYYY-MM-DD`) onto main, then deletes the side branch.
# This works around the GitHub App default-branch push restriction that
# blocks the routine from pushing to main directly.

on:
  push:
    branches:
      - 'auto/status-*'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Fast-forward merge into main
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git merge --ff-only "origin/$BRANCH"
          git push origin main
          git push origin --delete "$BRANCH"
